<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logging in... – 24QuickCharts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080c10;
      color: rgba(255,255,255,0.9);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 2px;
    }
    .logo span { color: #00ff88; }
    .message {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(0,255,136,0.15);
      border-top-color: #00ff88;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box {
      background: rgba(255,68,68,0.1);
      border: 1px solid rgba(255,68,68,0.2);
      border-radius: 10px;
      padding: 16px 24px;
      color: #ff6b6b;
      font-size: 14px;
      max-width: 340px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="logo"><span>24</span>QuickCharts</div>
  <div class="spinner" id="spinner"></div>
  <div class="message" id="message">Logging you in...</div>
  <div class="error-box" id="error-box"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    window.supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  </script>
  <script src="js/auth.js"></script>
  <script>
    (async () => {
      try {
        await Auth.handleCallback();
        document.getElementById('message').textContent = 'Logged in! Redirecting...';
        const returnTo = sessionStorage.getItem('qc_return_to') || 'index.html';
        sessionStorage.removeItem('qc_return_to');
        window.location.href = returnTo;
      } catch (e) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('message').textContent = 'Login failed';
        const errBox = document.getElementById('error-box');
        errBox.style.display = 'block';
        errBox.textContent = e.message || 'Something went wrong. Please try again.';
      }
    })();
  </script>
</body>
</html>
