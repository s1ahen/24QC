<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24QuickCharts – Viewer</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #00ff88;
      --green-dim: #00cc6a;
      --green-glow: rgba(0,255,136,0.12);
      --dark:   #080c10;
      --dark-2: #0d1117;
      --dark-3: #161b22;
      --dark-4: #1c2330;
      --border: rgba(255,255,255,0.07);
      --text:   rgba(255,255,255,0.9);
      --text-dim: rgba(255,255,255,0.45);
      --red:    #ff4444;
      --amber:  #ffaa00;
      --sidebar-w: 300px;
    }
    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ── Top Header ── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 54px;
      background: rgba(8,12,16,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 200;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 10px;
      border-radius: 7px;
      border: 1px solid var(--border);
      transition: color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .back-btn:hover { color: var(--text); background: var(--dark-3); }

    .airport-badge {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .airport-code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--green);
      letter-spacing: 1px;
      line-height: 1;
    }
    .airport-name {
      font-size: 13px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    /* Header search */
    .header-search {
      flex: 1;
      max-width: 320px;
      position: relative;
    }
    .header-search-box {
      display: flex;
      align-items: center;
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 5px 5px 12px;
      gap: 8px;
      transition: border-color 0.2s;
    }
    .header-search-box:focus-within { border-color: var(--green); }
    .header-search-box i { color: var(--green); font-size: 13px; flex-shrink: 0; }
    .header-search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      min-width: 0;
    }
    .header-search-box input::placeholder { color: var(--text-dim); }
    .header-search-btn {
      padding: 5px 12px;
      background: var(--green);
      color: var(--dark);
      border: none;
      border-radius: 6px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .search-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      z-index: 300;
      display: none;
    }
    .search-result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      font-size: 13px;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--dark-4); }
    .result-code { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--green); min-width: 50px; }
    .result-name { color: var(--text-dim); font-size: 12px; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Icon buttons in header */
    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--dark-3);
      color: var(--text-dim);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
      position: relative;
    }
    .icon-btn:hover { color: var(--text); background: var(--dark-4); }
    .icon-btn.active { color: var(--green); border-color: rgba(0,255,136,0.3); }
    .icon-btn .badge {
      position: absolute;
      top: -4px; right: -4px;
      background: var(--red);
      color: white;
      border-radius: 100px;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 4px;
      min-width: 14px;
      text-align: center;
      display: none;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      height: 100vh;
      padding-top: 54px;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--dark-2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 100%;
    }

    /* Tab row */
    .tab-row {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 4px 10px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      position: relative;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); }
    .tab-btn.active.GEN  { border-bottom-color: #ff6b6b; color: #ff6b6b; }
    .tab-btn.active.GND  { border-bottom-color: hotpink; color: hotpink; }
    .tab-btn.active.SID  { border-bottom-color: #9b59b6; color: #9b59b6; }
    .tab-btn.active.STAR { border-bottom-color: cyan; color: cyan; }
    .tab-btn.active.APP  { border-bottom-color: var(--green); color: var(--green); }
    .tab-btn.disabled { opacity: 0.3; cursor: default; pointer-events: none; }

    /* Author filter */
    .author-bar {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: none;
    }
    .author-bar select {
      width: 100%;
      padding: 7px 10px;
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .author-bar select:focus { border-color: var(--green); }
    .author-bar select option { background: var(--dark-3); }

    /* Chart list */
    .chart-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .chart-list-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      font-size: 13px;
      gap: 10px;
      text-align: center;
      padding: 20px;
    }
    .chart-list-empty i { font-size: 28px; opacity: 0.4; }

    .chart-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 6px;
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      gap: 8px;
    }
    .chart-btn:hover { background: var(--dark-4); border-color: rgba(255,255,255,0.12); }
    .chart-btn.active { border-color: var(--green); background: var(--green-glow); }

    .chart-btn-name {
      flex: 1;
      line-height: 1.4;
      min-width: 0;
    }

    .pin-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s;
      transform: rotate(45deg);
    }
    .pin-btn:hover { color: var(--amber); }
    .pin-btn.pinned { color: var(--amber); transform: rotate(0deg); }

    /* Sidebar loading */
    .sidebar-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      font-size: 13px;
      gap: 10px;
    }

    /* ── Main viewer area ── */
    .viewer-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
    }

    /* Placeholder when no chart selected */
    .viewer-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      gap: 14px;
      text-align: center;
      padding: 40px;
    }
    .viewer-placeholder i { font-size: 48px; opacity: 0.2; }
    .viewer-placeholder p { font-size: 14px; line-height: 1.7; }

    /* Image viewer — canvas based */
    .image-viewer {
      position: absolute;
      inset: 0;
      display: none;
      cursor: grab;
    }
    .image-viewer:active { cursor: grabbing; }
    #viewer-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Viewer controls - all grouped bottom right */
    .viewer-controls {
      position: absolute;
      bottom: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      background: rgba(8,12,16,0.88);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      z-index: 10;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .viewer-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .viewer-btn:last-child { border-bottom: none; }
    .viewer-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .viewer-btn.close-btn { color: rgba(255,80,80,0.7); }
    .viewer-btn.close-btn:hover { background: rgba(255,68,68,0.12); color: var(--red); }

    /* Divider between button groups */
    .viewer-controls-divider {
      height: 1px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* Keyboard hint */
    .key-hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--text-dim);
      background: rgba(8,12,16,0.7);
      backdrop-filter: blur(4px);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
    .key-hint.show { opacity: 1; }

    /* ── Pinned sidebar (right) ── */
    .pinned-sidebar {
      position: fixed;
      top: 54px;
      right: -320px;
      width: 300px;
      height: calc(100vh - 54px);
      background: var(--dark-2);
      border-left: 1px solid var(--border);
      z-index: 150;
      transition: right 0.3s ease;
      overflow-y: auto;
      box-shadow: -10px 0 30px rgba(0,0,0,0.4);
    }
    .pinned-sidebar.open { right: 0; }

    .pinned-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--dark-2);
      z-index: 1;
    }
    .pinned-header h3 {
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pinned-header h3 i { color: var(--amber); }
    .pinned-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 15px;
      cursor: pointer;
      border-radius: 4px;
      padding: 4px;
      transition: color 0.2s;
    }
    .pinned-close:hover { color: var(--red); }

    .pinned-list { padding: 10px; }

    .pinned-airport-group { margin-bottom: 16px; }
    .pinned-airport-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      color: var(--green);
      letter-spacing: 1px;
      padding: 4px 6px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pinned-airport-label span { font-size: 11px; color: var(--text-dim); font-family: 'Inter', sans-serif; font-weight: 400; }

    .pinned-chart-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      margin-bottom: 4px;
      background: var(--dark-3);
      border-radius: 7px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-dim);
      transition: background 0.15s, color 0.15s;
      gap: 8px;
    }
    .pinned-chart-item:hover { background: var(--dark-4); color: var(--text); }
    .pinned-chart-item .remove-pin {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      padding: 2px;
      flex-shrink: 0;
      border-radius: 4px;
      transition: color 0.2s;
    }
    .pinned-chart-item .remove-pin:hover { color: var(--red); }

    .no-pins {
      text-align: center;
      padding: 30px 16px;
      color: var(--text-dim);
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 20px;
      left: calc(var(--sidebar-w) + 20px);
      padding: 10px 18px;
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.pinned-toast  { border-color: rgba(255,170,0,0.3); color: var(--amber); }
    .toast.unpinned-toast { border-color: rgba(255,255,255,0.1); color: var(--text-dim); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--dark-4); border-radius: 3px; }

    /* Light mode */
    body.light-mode {
      --dark:   #f0f2f5;
      --dark-2: #e4e7eb;
      --dark-3: #d8dce1;
      --dark-4: #cdd1d8;
      --border: rgba(0,0,0,0.09);
      --text:   rgba(0,0,0,0.85);
      --text-dim: rgba(0,0,0,0.45);
    }
    body.light-mode .header { background: rgba(240,242,245,0.95); }
    body.light-mode .viewer-area { background: #c8cdd4; }
    body.light-mode .viewer-btn { background: rgba(240,242,245,0.9); }

    /* Responsive: collapse sidebar on small screens */
    @media (max-width: 640px) {
      :root { --sidebar-w: 260px; }
      .airport-name { display: none; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Home
      </a>
      <div class="airport-badge">
        <span class="airport-code" id="airport-code">––</span>
        <span class="airport-name" id="airport-name"></span>
      </div>
    </div>

    <!-- Search another airport -->
    <div class="header-search">
      <div class="header-search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Search airports..." autocomplete="off">
        <button class="header-search-btn" onclick="doSearch()">Go</button>
      </div>
      <div id="search-dropdown" class="search-dropdown"></div>
    </div>

    <div class="header-right">
      <button class="icon-btn" id="pin-toggle-btn" title="Pinned charts" onclick="togglePinnedSidebar()">
        <i class="fas fa-thumbtack"></i>
        <span class="badge" id="pin-badge"></span>
      </button>
      <button class="icon-btn" id="theme-btn" title="Toggle theme" onclick="toggleTheme()">
        <i class="fas fa-circle-half-stroke"></i>
      </button>
      <a href="https://discord.gg/HCXeChs4Ye" target="_blank" class="icon-btn" title="Discord" style="text-decoration:none; color:var(--text-dim);">
        <i class="fab fa-discord"></i>
      </a>
    </div>
  </header>

  <!-- Layout -->
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <!-- Tab row -->
      <div class="tab-row" id="tab-row">
        <button class="tab-btn GEN disabled" data-tag="GEN" onclick="selectTab('GEN')">GEN</button>
        <button class="tab-btn GND disabled" data-tag="GND" onclick="selectTab('GND')">GND</button>
        <button class="tab-btn SID disabled" data-tag="SID" onclick="selectTab('SID')">SID</button>
        <button class="tab-btn STAR disabled" data-tag="STAR" onclick="selectTab('STAR')">STAR</button>
        <button class="tab-btn APP disabled" data-tag="APP" onclick="selectTab('APP')">APP</button>
      </div>

      <!-- Author filter (SID/STAR/APP only) -->
      <div class="author-bar" id="author-bar">
        <select id="author-select" onchange="selectAuthor()">
          <option value="">All authors</option>
        </select>
      </div>

      <!-- Chart list -->
      <div class="chart-list" id="chart-list">
        <div class="sidebar-loading">
          <i class="fas fa-circle-notch fa-spin"></i> Loading charts...
        </div>
      </div>
    </aside>

    <!-- Main area -->
    <main class="viewer-area" id="viewer-area">
      <!-- Placeholder -->
      <div class="viewer-placeholder" id="viewer-placeholder">
        <i class="fas fa-map"></i>
        <p>Select a chart from the sidebar<br>to view it here.</p>
        <p style="font-size:12px; margin-top:8px;">
          <kbd style="background:var(--dark-3); border:1px solid var(--border); border-radius:4px; padding:2px 6px; font-family:monospace;">F</kbd>
          to recenter &nbsp;·&nbsp; scroll to zoom
        </p>
      </div>

      <!-- Image viewer — canvas renderer -->
      <div class="image-viewer" id="image-viewer">
        <canvas id="viewer-canvas"></canvas>
      </div>

      <!-- Controls -->
      <div class="viewer-controls" id="viewer-controls" style="display:none;">
        <button class="viewer-btn" title="Recenter (F)" onclick="recenterImage()">
          <i class="fas fa-crosshairs"></i>
        </button>
        <button class="viewer-btn" title="Zoom in (+)" onclick="zoomIn()">
          <i class="fas fa-plus"></i>
        </button>
        <button class="viewer-btn" title="Zoom out (-)" onclick="zoomOut()">
          <i class="fas fa-minus"></i>
        </button>
        <div class="viewer-controls-divider"></div>
        <button class="viewer-btn" title="Rotate 90° (R)" onclick="rotateImage()">
          <i class="fas fa-rotate-right"></i>
        </button>
        <div class="viewer-controls-divider"></div>
        <button class="viewer-btn close-btn" title="Close (Esc)" onclick="closeViewer()">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <div class="key-hint" id="key-hint">F recenter · Scroll zoom · Drag pan · R rotate</div>
    </main>
  </div>

  <!-- Pinned sidebar (right) -->
  <div class="pinned-sidebar" id="pinned-sidebar">
    <div class="pinned-header">
      <h3><i class="fas fa-thumbtack"></i> Pinned Charts</h3>
      <button class="pinned-close" onclick="togglePinnedSidebar()"><i class="fas fa-times"></i></button>
    </div>
    <div class="pinned-list" id="pinned-list"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    window.supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  </script>
  <script src="js/auth.js"></script>
  <script src="js/submissions.js"></script>
  <script src="js/chartdata.js"></script>
  <script>
  // ============================================================
  // viewer.js (inline)
  // ============================================================

  // ── State ──────────────────────────────────────────────────
  let airportCode = '';
  let airportName = '';
  let chartData = {};        // { GEN: [...], GND: [...], SID: { authors: {} }, ... }
  let airports = [];
  let currentTag = null;
  let currentAuthor = '';    // '' = all
  let currentChartUrl = '';
  let scale = 1;
  // drag state is managed inside setupImageViewer

  const STATIC_AIRPORTS = [
    { code: 'IBAR', name: 'Barra Airport' },
    { code: 'IHEN', name: 'Henstridge Airfield' },
    { code: 'ILAR', name: 'Larnaca International Airport' },
    { code: 'IIAB', name: 'McConnell Air Force Base' },
    { code: 'IPAP', name: 'Paphos International Airport' },
    { code: 'IGRV', name: 'Grindavik Airport' },
    { code: 'IJAF', name: 'Al Najaf Airport' },
    { code: 'IZOL', name: 'Izolirani International Airport' },
    { code: 'ISCM', name: 'RAF Scampton' },
    { code: 'IDCS', name: 'Saba Airport' },
    { code: 'ITKO', name: 'Tokyo-Orenji International Airport' },
    { code: 'ILKL', name: 'Lukla Airport' },
    { code: 'IPPH', name: 'Perth International Airport' },
    { code: 'IGAR', name: 'Air Base Garry' },
    { code: 'IBLT', name: 'Boltic Airfield' },
    { code: 'IRFD', name: 'Greator Rockford International Airport' },
    { code: 'IMLR', name: 'Mellor International Airport' },
    { code: 'ITRC', name: 'Training Center' },
    { code: 'IBTH', name: 'Saint Barthélemy Airport' },
    { code: 'IUFO', name: 'UFO Base' },
    { code: 'ISAU', name: 'Sauthamptona Airport' },
    { code: 'ISKP', name: 'Skopelos Airfield' },
  ];

  // ── Init ───────────────────────────────────────────────────
  async function init() {
    // Get airport from URL param
    const params = new URLSearchParams(window.location.search);
    airportCode = (params.get('airport') || '').toUpperCase();

    if (!airportCode) {
      window.location.href = 'index.html';
      return;
    }

    // Load airports for search
    try {
      airports = await Submissions.getAirports();
    } catch {
      airports = STATIC_AIRPORTS;
    }

    // Set airport info in header
    const ap = airports.find(a => a.code === airportCode);
    airportName = ap ? ap.name : airportCode;
    document.getElementById('airport-code').textContent = airportCode;
    document.getElementById('airport-name').textContent = airportName;
    document.title = `${airportCode} – 24QuickCharts`;

    // Load charts for this airport
    await loadCharts();

    // Setup search
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', handleSearch);
    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    // Setup image viewer interactions
    setupImageViewer();

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (e.key.toLowerCase() === 'f') recenterImage();
      if (e.key.toLowerCase() === 'r') rotateImage();
      if (e.key === '+' || e.key === '=') zoomIn();
      if (e.key === '-') zoomOut();
      if (e.key === 'Escape') closeViewer();
    });

    // Close search dropdown on outside click
    document.addEventListener('click', e => {
      if (!e.target.closest('.header-search')) {
        document.getElementById('search-dropdown').style.display = 'none';
      }
    });

    // Update pin badge
    updatePinBadge();
    renderPinnedSidebar();

    // Show keyboard hint briefly on first load
    showKeyHint();
  }

  // ── Load charts from Supabase ──────────────────────────────
  async function loadCharts() {
    document.getElementById('chart-list').innerHTML =
      '<div class="sidebar-loading"><i class="fas fa-circle-notch fa-spin"></i> Loading charts...</div>';

    try {
      chartData = await Submissions.getApprovedCharts(airportCode);
    } catch (e) {
      // Fallback: try loading from old static data if available
      chartData = {};
      document.getElementById('chart-list').innerHTML =
        `<div class="chart-list-empty"><i class="fas fa-exclamation-circle"></i>Failed to load charts.<br><small>${e.message}</small></div>`;
    }

    // Enable/disable tabs based on available data
    const tags = ['GEN', 'GND', 'SID', 'STAR', 'APP'];
    let firstAvailable = null;

    tags.forEach(tag => {
      const btn = document.querySelector(`.tab-btn.${tag}`);
      const hasData = hasCharts(tag);
      btn.classList.toggle('disabled', !hasData);
      if (hasData && !firstAvailable) firstAvailable = tag;
    });

    // Auto-select first available tab
    if (firstAvailable) {
      selectTab(firstAvailable);
    } else {
      document.getElementById('chart-list').innerHTML =
        '<div class="chart-list-empty"><i class="fas fa-folder-open"></i>No charts available<br>for this airport yet.</div>';
    }
  }

  function hasCharts(tag) {
    if (!chartData[tag]) return false;
    if (tag === 'GEN' || tag === 'GND') return chartData[tag].length > 0;
    return chartData[tag].authors && Object.keys(chartData[tag].authors).length > 0;
  }

  // ── Tab selection ──────────────────────────────────────────
  function selectTab(tag) {
    if (document.querySelector(`.tab-btn.${tag}`)?.classList.contains('disabled')) return;

    currentTag = tag;
    currentAuthor = '';

    // Update tab styles
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.tab-btn.${tag}`)?.classList.add('active');

    const authorBar = document.getElementById('author-bar');
    const authorSelect = document.getElementById('author-select');

    if (tag === 'GEN' || tag === 'GND') {
      authorBar.style.display = 'none';
      renderChartList(chartData[tag] || []);
    } else {
      // Populate author dropdown
      authorBar.style.display = 'block';
      const authors = Object.keys(chartData[tag]?.authors || {});
      authorSelect.innerHTML = '<option value="">All authors</option>' +
        authors.map(a => `<option value="${a}">${a}</option>`).join('');
      authorSelect.value = '';

      // Show all charts from all authors merged
      const allCharts = authors.flatMap(a => chartData[tag].authors[a]);
      renderChartList(allCharts);
    }
  }

  function selectAuthor() {
    currentAuthor = document.getElementById('author-select').value;
    const tag = currentTag;
    if (!tag || tag === 'GEN' || tag === 'GND') return;

    if (currentAuthor) {
      renderChartList(chartData[tag].authors[currentAuthor] || []);
    } else {
      const authors = Object.keys(chartData[tag]?.authors || {});
      renderChartList(authors.flatMap(a => chartData[tag].authors[a]));
    }
  }

  // ── Render chart buttons ───────────────────────────────────
  function renderChartList(charts) {
    const list = document.getElementById('chart-list');

    if (!charts || charts.length === 0) {
      list.innerHTML = '<div class="chart-list-empty"><i class="fas fa-folder-open"></i>No charts here yet.</div>';
      return;
    }

    list.innerHTML = charts.map(c => {
      const pinned = isPinned(c.pdf);
      return `
        <button class="chart-btn ${currentChartUrl === c.pdf ? 'active' : ''}"
                onclick="openChart('${c.pdf.replace(/'/g, "\\'")}', this)">
          <span class="chart-btn-name">${c.name}</span>
          <i class="fas fa-thumbtack pin-btn ${pinned ? 'pinned' : ''}"
             onclick="event.stopPropagation(); togglePin('${c.pdf.replace(/'/g, "\\'")}', '${c.name.replace(/'/g, "\\'").replace(/<[^>]*>/g, '')}', this)"
             title="${pinned ? 'Unpin' : 'Pin chart'}"></i>
        </button>
      `;
    }).join('');
  }

  // ── Canvas image viewer ────────────────────────────────────
  // State
  let cvs, ctx, img, rotation = 0;
  let panX = 0, panY = 0;
  let dragging = false, dragStartX, dragStartY, panStartX, panStartY;

  function getCanvas() { return document.getElementById('viewer-canvas'); }

  function syncCanvasSize() {
    // Only update pixel dimensions when they actually change
    const w = cvs.offsetWidth;
    const h = cvs.offsetHeight;
    if (cvs.width !== w || cvs.height !== h) {
      cvs.width  = w;
      cvs.height = h;
    }
  }

  function draw() {
    if (!cvs || !img || !img.complete) return;
    syncCanvasSize();
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    ctx.save();
    ctx.translate(cvs.width / 2 + panX, cvs.height / 2 + panY);
    ctx.rotate(rotation * Math.PI / 180);
    ctx.scale(scale, scale);
    ctx.drawImage(img, -img.naturalWidth / 2, -img.naturalHeight / 2);
    ctx.restore();
  }

  function fitScale() {
    const isRotated90 = rotation % 180 !== 0;
    const iw = isRotated90 ? img.naturalHeight : img.naturalWidth;
    const ih = isRotated90 ? img.naturalWidth  : img.naturalHeight;
    const scaleW = (cvs.offsetWidth  * 0.88) / iw;
    const scaleH = (cvs.offsetHeight * 0.88) / ih;
    scale = Math.min(scaleW, scaleH);
  }

  function openChart(url, btnEl) {
    if (!url) return;
    currentChartUrl = url;

    document.querySelectorAll('.chart-btn').forEach(b => b.classList.remove('active'));
    btnEl?.classList.add('active');

    cvs = getCanvas();
    cvs.width  = cvs.offsetWidth  || cvs.parentElement.offsetWidth;
    cvs.height = cvs.offsetHeight || cvs.parentElement.offsetHeight;
    ctx = cvs.getContext('2d');

    rotation = 0;
    panX = 0;
    panY = 0;

    img = new Image();
    img.onload = () => {
      fitScale();
      draw();
    };
    img.src = url;

    document.getElementById('image-viewer').style.display = 'block';
    document.getElementById('viewer-placeholder').style.display = 'none';
    document.getElementById('viewer-controls').style.display = 'flex';
    showKeyHint();
  }

  function closeViewer() {
    document.getElementById('image-viewer').style.display = 'none';
    document.getElementById('viewer-placeholder').style.display = 'flex';
    document.getElementById('viewer-controls').style.display = 'none';
    document.querySelectorAll('.chart-btn').forEach(b => b.classList.remove('active'));
    currentChartUrl = '';
    if (cvs && ctx) ctx.clearRect(0, 0, cvs.width, cvs.height);
  }

  function recenterImage() {
    panX = 0;
    panY = 0;
    if (img && img.complete) { fitScale(); draw(); }
  }

  function rotateImage() {
    rotation = (rotation + 90) % 360;
    fitScale();
    draw();
  }

  function zoomIn()  { scale = Math.min(scale * 1.25, 10); draw(); }
  function zoomOut() { scale = Math.max(scale * 0.8,  0.05); draw(); }

  function setupImageViewer() {
    const viewerEl = document.getElementById('image-viewer');

    // Resize canvas when window resizes
    window.addEventListener('resize', () => {
      if (!cvs || !img) return;
      syncCanvasSize();
      draw();
    });

    // Scroll to zoom
    viewerEl.addEventListener('wheel', e => {
      e.preventDefault();
      if (!img) return;
      const rect  = viewerEl.getBoundingClientRect();
      const mx    = e.clientX - rect.left - cvs.offsetWidth  / 2 - panX;
      const my    = e.clientY - rect.top  - cvs.offsetHeight / 2 - panY;
      const delta = e.deltaY < 0 ? 1.1 : 0.9;
      const newScale = Math.max(0.05, Math.min(10, scale * delta));
      const ratio = newScale / scale;
      panX -= mx * (ratio - 1);
      panY -= my * (ratio - 1);
      scale = newScale;
      draw();
    }, { passive: false });

    // Drag to pan
    viewerEl.addEventListener('mousedown', e => {
      dragging   = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      panStartX  = panX;
      panStartY  = panY;
      viewerEl.style.cursor = 'grabbing';
    });

    document.addEventListener('mouseup', () => {
      dragging = false;
      viewerEl.style.cursor = 'grab';
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      panX = panStartX + (e.clientX - dragStartX);
      panY = panStartY + (e.clientY - dragStartY);
      draw();
    });

    // Touch pinch-zoom + pan
    let lastTouchDist = null;
    let lastTouchMid  = null;
    viewerEl.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        lastTouchDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        lastTouchMid = {
          x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
          y: (e.touches[0].clientY + e.touches[1].clientY) / 2
        };
      } else if (e.touches.length === 1) {
        dragging   = true;
        dragStartX = e.touches[0].clientX;
        dragStartY = e.touches[0].clientY;
        panStartX  = panX;
        panStartY  = panY;
      }
    }, { passive: true });

    viewerEl.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length === 2 && lastTouchDist) {
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        scale = Math.max(0.05, Math.min(10, scale * (dist / lastTouchDist)));
        lastTouchDist = dist;
        draw();
      } else if (e.touches.length === 1 && dragging) {
        panX = panStartX + (e.touches[0].clientX - dragStartX);
        panY = panStartY + (e.touches[0].clientY - dragStartY);
        draw();
      }
    }, { passive: false });

    viewerEl.addEventListener('touchend', () => { dragging = false; lastTouchDist = null; });
  }

  // ── Keyboard hint ──────────────────────────────────────────
  let hintTimer;
  function showKeyHint() {
    const hint = document.getElementById('key-hint');
    hint.classList.add('show');
    clearTimeout(hintTimer);
    hintTimer = setTimeout(() => hint.classList.remove('show'), 3000);
  }

  // ── Pin system ─────────────────────────────────────────────
  function getPins() {
    try { return JSON.parse(localStorage.getItem('pinnedCharts') || '{}'); }
    catch { return {}; }
  }

  function savePins(pins) {
    localStorage.setItem('pinnedCharts', JSON.stringify(pins));
  }

  function isPinned(url) {
    const pins = getPins();
    return !!(pins[airportCode]?.some(p => p.url === url));
  }

  function togglePin(url, name, iconEl) {
    const pins = getPins();
    if (!pins[airportCode]) pins[airportCode] = [];

    const alreadyPinned = pins[airportCode].some(p => p.url === url);

    if (alreadyPinned) {
      pins[airportCode] = pins[airportCode].filter(p => p.url !== url);
      if (pins[airportCode].length === 0) delete pins[airportCode];
      iconEl.classList.remove('pinned');
      showToast('Chart unpinned', 'unpinned-toast');
    } else {
      pins[airportCode].push({ url, name, airport: airportCode, airportName });
      iconEl.classList.add('pinned');
      showToast('Chart pinned!', 'pinned-toast');
    }

    savePins(pins);
    updatePinBadge();
    renderPinnedSidebar();
  }

  function updatePinBadge() {
    const pins = getPins();
    const total = Object.values(pins).reduce((s, arr) => s + arr.length, 0);
    const badge = document.getElementById('pin-badge');
    if (total > 0) {
      badge.textContent = total;
      badge.style.display = 'block';
      document.getElementById('pin-toggle-btn').classList.add('active');
    } else {
      badge.style.display = 'none';
      document.getElementById('pin-toggle-btn').classList.remove('active');
    }
  }

  function togglePinnedSidebar() {
    document.getElementById('pinned-sidebar').classList.toggle('open');
    renderPinnedSidebar();
  }

  function renderPinnedSidebar() {
    const pins = getPins();
    const list = document.getElementById('pinned-list');

    if (Object.keys(pins).length === 0) {
      list.innerHTML = '<div class="no-pins">No pinned charts yet.<br>Click the 📌 icon on any chart to pin it.</div>';
      return;
    }

    list.innerHTML = Object.entries(pins).map(([code, charts]) => {
      const name = airports.find(a => a.code === code)?.name || code;
      return `
        <div class="pinned-airport-group">
          <div class="pinned-airport-label">
            ${code} <span>${charts.length} chart${charts.length !== 1 ? 's' : ''}</span>
          </div>
          ${charts.map(c => `
            <div class="pinned-chart-item" onclick="openChart('${c.url.replace(/'/g, "\\'")}', null)">
              <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.name}</span>
              <button class="remove-pin" onclick="event.stopPropagation(); removePinByUrl('${code}', '${c.url.replace(/'/g, "\\'")}')">
                <i class="fas fa-times"></i>
              </button>
            </div>
          `).join('')}
        </div>
      `;
    }).join('');
  }

  function removePinByUrl(code, url) {
    const pins = getPins();
    if (!pins[code]) return;
    pins[code] = pins[code].filter(p => p.url !== url);
    if (pins[code].length === 0) delete pins[code];
    savePins(pins);
    updatePinBadge();
    renderPinnedSidebar();

    // Update pin icon in list if visible
    document.querySelectorAll('.chart-btn').forEach(btn => {
      const icon = btn.querySelector('.pin-btn');
      const chartUrl = btn.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
      if (chartUrl === url && icon) icon.classList.remove('pinned');
    });

    showToast('Chart unpinned', 'unpinned-toast');
  }

  // ── Search ─────────────────────────────────────────────────
  function handleSearch() {
    const term = document.getElementById('search-input').value.trim().toUpperCase();
    const dd = document.getElementById('search-dropdown');

    if (term.length < 1) { dd.style.display = 'none'; return; }

    const matches = airports.filter(a =>
      a.code.includes(term) || a.name.toUpperCase().includes(term)
    ).slice(0, 6);

    if (!matches.length) { dd.style.display = 'none'; return; }

    dd.innerHTML = matches.map(a => `
      <div class="search-result-item" onclick="navigateToAirport('${a.code}')">
        <span class="result-code">${a.code}</span>
        <span class="result-name">${a.name}</span>
      </div>
    `).join('');
    dd.style.display = 'block';
  }

  function doSearch() {
    const val = document.getElementById('search-input').value.trim().toUpperCase();
    const match = airports.find(a => a.code === val) ||
                  airports.find(a => a.code.startsWith(val));
    if (match) navigateToAirport(match.code);
  }

  function navigateToAirport(code) {
    window.location.href = `viewer.html?airport=${code}`;
  }

  // ── Theme ──────────────────────────────────────────────────
  function toggleTheme() {
    document.body.classList.toggle('light-mode');
    localStorage.setItem('qc_theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
  }

  // ── Toast ──────────────────────────────────────────────────
  function showToast(msg, cls = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${cls} show`;
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Start ──────────────────────────────────────────────────
  // Apply saved theme
  if (localStorage.getItem('qc_theme') === 'light') {
    document.body.classList.add('light-mode');
  }

  document.addEventListener('DOMContentLoaded', init);
  </script>
