<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Queue – 24QuickCharts</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/review.css">
</head>
<body>

  <!-- Background image with overlay (replace bg-placeholder with game screenshot URL) -->
  <div class="review-bg">
    <div class="review-bg-overlay"></div>
  </div>

  <!-- Nav -->
  <nav class="topnav">
    <a href="index.html" class="topnav-brand">
      <span class="brand-number">24</span><span class="brand-word">QuickCharts</span>
    </a>
    <div class="topnav-right">
      <div class="user-info" id="reviewer-info"></div>
      <button class="btn-logout" onclick="Auth.logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </nav>

  <!-- Access denied (shown if not reviewer) -->
  <div id="access-denied" style="display:none;" class="access-denied">
    <div class="denied-box">
      <i class="fas fa-lock denied-icon"></i>
      <h2>Access Restricted</h2>
      <p>This page is only accessible to chart reviewers.</p>
      <a href="index.html" class="btn-back">← Back to Home</a>
    </div>
  </div>

  <!-- Review content -->
  <div id="review-content" style="display:none;" class="review-content">
    <div class="review-header">
      <div>
        <h1 class="review-title">
          <i class="fas fa-clipboard-check"></i> Review Queue
        </h1>
        <p class="review-sub">Chart submissions awaiting approval</p>
      </div>
      <div class="queue-tabs">
        <button class="tab active" data-tab="pending" onclick="switchTab('pending')">
          <i class="fas fa-clock"></i> Pending
          <span class="tab-count" id="pending-count">–</span>
        </button>
        <button class="tab" data-tab="approved" onclick="switchTab('approved')">
          <i class="fas fa-check-circle"></i> Approved
        </button>
        <button class="tab" data-tab="denied" onclick="switchTab('denied')">
          <i class="fas fa-times-circle"></i> Denied
        </button>
      </div>
    </div>

    <!-- Queue list -->
    <div id="queue-list" class="queue-list">
      <div class="loading-spinner"><i class="fas fa-circle-notch fa-spin"></i> Loading queue...</div>
    </div>
  </div>

  <!-- ── Deny Modal ── -->
  <div id="deny-modal" class="modal-overlay" style="display:none;">
    <div class="deny-modal-box">
      <div class="modal-header">
        <h2><i class="fas fa-times-circle" style="color:#ff4444;"></i> Deny Submission</h2>
        <button class="modal-close" onclick="closeDenyModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <p style="color:rgba(255,255,255,0.6); font-size:14px; margin-bottom:16px;">
          Explain what needs to be fixed. The submitter will see these notes.
        </p>
        <label class="field-label">Review Notes <span style="color:#ff4444;">*</span></label>
        <textarea id="deny-notes" class="deny-textarea" placeholder="e.g. Chart names don't match the standard format, image quality is too low..."></textarea>
        <div style="display:flex; gap:10px; margin-top:16px; justify-content:flex-end;">
          <button class="btn-secondary" onclick="closeDenyModal()">Cancel</button>
          <button class="btn-deny-confirm" onclick="confirmDeny()">
            <i class="fas fa-times-circle"></i> Confirm Deny
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Image preview modal -->
  <div id="img-preview" class="img-preview-overlay" style="display:none;" onclick="closeImgPreview()">
    <img id="img-preview-src" src="" alt="Chart preview">
    <button class="img-preview-close" onclick="closeImgPreview()"><i class="fas fa-times"></i></button>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    window.supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  </script>
  <script src="js/auth.js"></script>
  <script src="js/submissions.js"></script>
  <script src="js/review.js"></script>
</body>
</html>
